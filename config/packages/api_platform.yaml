api_platform:
    title: 'Rezilio NIS2 API'
    description: 'API de suivi de conformité à la directive NIS2'
    version: '1.0.0'
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
        jsonhal:
            mime_types: ['application/hal+json']
    docs_formats:
        jsonopenapi:
            mime_types: ['application/vnd.openapi+json']
        html:
            mime_types: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization']
        extra_properties:
            standard_put: true
            rfc_7807_compliant_errors: true
    event_listeners_backward_compatibility_layer: false
    keep_legacy_inflector: false
